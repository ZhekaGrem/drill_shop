<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Градієнт для підсвічування тріщин -->
    <linearGradient id="crackGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff44;stop-opacity:1" />
    </linearGradient>
    
    <!-- Фільтр для тіні -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Текстура фону -->
    <pattern id="noise" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="#e8e4d9"/>
      <circle cx="20" cy="30" r="0.5" fill="#d0ccc0"/>
      <circle cx="60" cy="10" r="0.7" fill="#d5d1c5"/>
      <circle cx="80" cy="70" r="0.4" fill="#ccc8bc"/>
      <circle cx="40" cy="80" r="0.6" fill="#d2cec2"/>
      <circle cx="10" cy="60" r="0.5" fill="#d8d4c8"/>
    </pattern>
  </defs>
  
  <!-- Фон -->
  <rect width="100%" height="100%" fill="url(#noise)"/>
  
  <!-- SHOP - перший рядок -->
  <g transform="translate(80, 80) rotate(-8)">
    
    <!-- S -->
    <g transform="translate(0, 0)">
      <!-- Тінь/глибина (жовто-зелена) -->
      <path d="M45 10 L95 10 L95 25 Q95 5 75 5 L45 5 Q15 5 15 35 L15 55 Q15 75 45 75 L75 75 Q95 75 95 95 L95 115 Q95 145 65 145 L15 145 L15 130 L65 130 Q80 130 80 115 L80 100 Q80 85 65 85 L45 85 Q15 85 15 55 L15 35 Q15 15 45 15 Z" 
                  fill="url(#crackGlow)" transform="translate(8, 8)"/>
      <!-- Основна літера -->
      <path d="M45 10 L95 10 L95 25 Q95 5 75 5 L45 5 Q15 5 15 35 L15 55 Q15 75 45 75 L75 75 Q95 75 95 95 L95 115 Q95 145 65 145 L15 145 L15 130 L65 130 Q80 130 80 115 L80 100 Q80 85 65 85 L45 85 Q15 85 15 55 L15 35 Q15 15 45 15 Z" 
                  fill="#2d3a2e"/>
      <!-- Тріщини -->
      <path d="M50 10 L48 45 L55 50 L45 75 M75 5 L70 40 L78 60 L72 85" 
                  stroke="url(#crackGlow)" stroke-width="3" fill="none"/>
      <!-- Фрагменти -->
      <path d="M30 30 L50 25 L48 45 L25 50 Z" fill="#1a2a1a" opacity="0.9"/>
      <path d="M60 60 L80 55 L78 80 L55 85 Z" fill="#3d4a3d" opacity="0.8"/>
    </g>
    
    <!-- H -->
    <g transform="translate(110, 0)">
      <path d="M10 10 L30 10 L30 60 L70 60 L70 10 L90 10 L90 140 L70 140 L70 80 L30 80 L30 140 L10 140 Z" 
                  fill="url(#crackGlow)" transform="translate(8, 8)"/>
      <path d="M10 10 L30 10 L30 60 L70 60 L70 10 L90 10 L90 140 L70 140 L70 80 L30 80 L30 140 L10 140 Z" 
                  fill="#2d3a2e"/>
      <path d="M30 10 L35 55 L28 62 M70 60 L65 100 L72 110 L68 140" 
                  stroke="url(#crackGlow)" stroke-width="3" fill="none"/>
      <path d="M15 20 L35 15 L37 50 L12 55 Z" fill="#1a2a1a" opacity="0.85"/>
      <path d="M72 90 L88 85 L90 125 L70 130 Z" fill="#3d4a3d" opacity="0.75"/>
    </g>
    
    <!-- O -->
    <g transform="translate(220, 0)">
      <path d="M50 5 Q95 5 95 50 L95 100 Q95 145 50 145 Q5 145 5 100 L5 50 Q5 5 50 5 Z M50 25 Q25 25 25 50 L25 100 Q25 125 50 125 Q75 125 75 100 L75 50 Q75 25 50 25 Z" 
                  fill="url(#crackGlow)" transform="translate(8, 8)"/>
      <path d="M50 5 Q95 5 95 50 L95 100 Q95 145 50 145 Q5 145 5 100 L5 50 Q5 5 50 5 Z M50 25 Q25 25 25 50 L25 100 Q25 125 50 125 Q75 125 75 100 L75 50 Q75 25 50 25 Z" 
                  fill="#2d3a2e"/>
      <path d="M50 5 L55 35 L48 45 M5 75 L35 70 L40 85 L25 100" 
                  stroke="url(#crackGlow)" stroke-width="3" fill="none"/>
      <path d="M55 10 L80 20 L75 50 L50 45 Z" fill="#3d4a3d" opacity="0.8"/>
      <path d="M10 90 L30 85 L35 120 L8 125 Z" fill="#1a2a1a" opacity="0.85"/>
    </g>
    
    <!-- P -->
    <g transform="translate(330, 0)">
      <path d="M10 10 L70 10 Q95 10 95 45 L95 55 Q95 90 70 90 L30 90 L30 140 L10 140 Z M30 30 L30 70 L65 70 Q75 70 75 55 L75 45 Q75 30 65 30 Z" 
                  fill="url(#crackGlow)" transform="translate(8, 8)"/>
      <path d="M10 10 L70 10 Q95 10 95 45 L95 55 Q95 90 70 90 L30 90 L30 140 L10 140 Z M30 30 L30 70 L65 70 Q75 70 75 55 L75 45 Q75 30 65 30 Z" 
                  fill="#2d3a2e"/>
      <path d="M45 10 L50 40 L42 55 L48 90 M30 90 L28 115 L35 125 L30 140" 
                  stroke="url(#crackGlow)" stroke-width="3" fill="none"/>
      <path d="M55 15 L85 20 L82 50 L52 48 Z" fill="#3d4a3d" opacity="0.75"/>
      <path d="M12 100 L28 95 L30 130 L10 135 Z" fill="#1a2a1a" opacity="0.9"/>
    </g>
  </g>
  
  <!-- DRILL - другий рядок -->
  <g transform="translate(120, 230) rotate(-8)">
    
    <!-- D -->
    <g transform="translate(0, 0)">
      <path d="M10 10 L60 10 Q100 10 100 50 L100 100 Q100 140 60 140 L10 140 Z M30 30 L30 120 L55 120 Q80 120 80 100 L80 50 Q80 30 55 30 Z" 
                  fill="url(#crackGlow)" transform="translate(8, 8)"/>
      <path d="M10 10 L60 10 Q100 10 100 50 L100 100 Q100 140 60 140 L10 140 Z M30 30 L30 120 L55 120 Q80 120 80 100 L80 50 Q80 30 55 30 Z" 
                  fill="#2d3a2e"/>
      <path d="M60 10 L55 45 L65 60 L58 90 M10 75 L30 72 L35 90 L28 110" 
                  stroke="url(#crackGlow)" stroke-width="3" fill="none"/>
      <path d="M65 15 L92 25 L88 60 L60 55 Z" fill="#3d4a3d" opacity="0.8"/>
      <path d="M12 85 L32 80 L35 115 L10 120 Z" fill="#1a2a1a" opacity="0.85"/>
    </g>
    
    <!-- R -->
    <g transform="translate(115, 0)">
      <path d="M10 10 L70 10 Q95 10 95 40 L95 55 Q95 80 75 85 L95 140 L72 140 L55 90 L30 90 L30 140 L10 140 Z M30 30 L30 72 L62 72 Q75 72 75 55 L75 45 Q75 30 62 30 Z" 
                  fill="url(#crackGlow)" transform="translate(8, 8)"/>
      <path d="M10 10 L70 10 Q95 10 95 40 L95 55 Q95 80 75 85 L95 140 L72 140 L55 90 L30 90 L30 140 L10 140 Z M30 30 L30 72 L62 72 Q75 72 75 55 L75 45 Q75 30 62 30 Z" 
                  fill="#2d3a2e"/>
      <path d="M50 10 L48 35 L55 50 L50 72 M75 85 L78 105 L85 115 L82 140" 
                  stroke="url(#crackGlow)" stroke-width="3" fill="none"/>
      <path d="M52 15 L88 22 L85 55 L48 50 Z" fill="#3d4a3d" opacity="0.75"/>
      <path d="M78 95 L93 100 L90 135 L75 130 Z" fill="#1a2a1a" opacity="0.85"/>
    </g>
    
    <!-- I -->
    <g transform="translate(225, 0)">
      <path d="M10 10 L50 10 L50 140 L10 140 Z" 
                  fill="url(#crackGlow)" transform="translate(8, 8)"/>
      <path d="M10 10 L50 10 L50 140 L10 140 Z" 
                  fill="#2d3a2e"/>
      <path d="M30 10 L28 50 L35 70 L30 100 L32 140" 
                  stroke="url(#crackGlow)" stroke-width="3" fill="none"/>
      <path d="M12 20 L48 15 L50 55 L10 60 Z" fill="#3d4a3d" opacity="0.8"/>
      <path d="M15 90 L48 85 L50 130 L12 135 Z" fill="#1a2a1a" opacity="0.75"/>
    </g>
    
    <!-- L -->
    <g transform="translate(290, 0)">
      <path d="M10 10 L30 10 L30 120 L85 120 L85 140 L10 140 Z" 
                  fill="url(#crackGlow)" transform="translate(8, 8)"/>
      <path d="M10 10 L30 10 L30 120 L85 120 L85 140 L10 140 Z" 
                  fill="#2d3a2e"/>
      <path d="M20 10 L22 45 L18 70 L25 100 L22 120 M30 120 L50 118 L60 125 L85 120" 
                  stroke="url(#crackGlow)" stroke-width="3" fill="none"/>
      <path d="M12 15 L28 12 L30 60 L10 65 Z" fill="#1a2a1a" opacity="0.85"/>
      <path d="M45 122 L82 118 L85 138 L42 140 Z" fill="#3d4a3d" opacity="0.8"/>
    </g>
    
    <!-- L -->
    <g transform="translate(385, 0)">
      <path d="M10 10 L30 10 L30 120 L85 120 L85 140 L10 140 Z" 
                  fill="url(#crackGlow)" transform="translate(8, 8)"/>
      <path d="M10 10 L30 10 L30 120 L85 120 L85 140 L10 140 Z" 
                  fill="#2d3a2e"/>
      <path d="M20 10 L18 55 L25 75 L20 105 M45 120 L55 115 L68 128 L85 122" 
                  stroke="url(#crackGlow)" stroke-width="3" fill="none"/>
      <path d="M12 60 L28 55 L30 100 L10 105 Z" fill="#3d4a3d" opacity="0.75"/>
      <path d="M55 122 L80 118 L82 138 L52 140 Z" fill="#1a2a1a" opacity="0.85"/>
    </g>
  </g>
  
  <!-- Додаткові фрагменти, що "відлітають" -->
  <g>
    <path d="M60 180 L75 175 L78 190 L62 195 Z" fill="#2d3a2e" transform="rotate(-15, 68, 185)"/>
    <path d="M60 180 L75 175 L78 190 L62 195 Z" fill="url(#crackGlow)" transform="rotate(-15, 68, 185) translate(-2, -2)" opacity="0.6"/>
    
    <path d="M540 320 L555 312 L560 328 L545 336 Z" fill="#2d3a2e" transform="rotate(10, 550, 324)"/>
    <path d="M540 320 L555 312 L560 328 L545 336 Z" fill="url(#crackGlow)" transform="rotate(10, 550, 324) translate(-2, -2)" opacity="0.6"/>
    
    <path d="M85 350 L100 345 L105 362 L88 367 Z" fill="#2d3a2e" transform="rotate(-20, 95, 356)"/>
    <path d="M85 350 L100 345 L105 362 L88 367 Z" fill="url(#crackGlow)" transform="rotate(-20, 95, 356) translate(-2, -2)" opacity="0.6"/>
  </g>
</svg>